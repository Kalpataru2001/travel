# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Recreate .env file from the single ENV_FILE GitHub Secret
      - name: Recreate .env file
        run: |
          echo "${{ secrets.ENV_FILE }}" > .env

      - name: Install dependencies & Build
        run: npm ci && npm run build

      - name: Deploy to Firebase Hosting
        run: |
          npx firebase-tools target:apply hosting app travel-app-65ff1
          npx firebase-tools deploy --only hosting --project travel-app-65ff1
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          # Fallback: if FIREBASE_TOKEN is not set, use the Service Account secret
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
