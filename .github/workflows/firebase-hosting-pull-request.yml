# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Recreate .env file from the single ENV_FILE GitHub Secret
      - name: Recreate .env file
        run: |
          echo "${{ secrets.ENV_FILE }}" > .env

      - name: Install dependencies & Build
        run: npm ci && npm run build

      - name: Deploy Preview to Firebase Hosting
        run: |
          npx firebase-tools target:apply hosting app travel-app-65ff1
          npx firebase-tools hosting:channel:deploy pr-${{ github.event.pull_request.number || 'preview' }} --project travel-app-65ff1
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
