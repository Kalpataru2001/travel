<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>AI Travel Guide — Plan Your Perfect Trip</title>
    <meta name="description" content="Plan your perfect trip with AI-powered itineraries, real-time weather, visa info, local events, packing lists, and more. Your smart travel companion." />
    <meta name="theme-color" content="#0f1729" />

    <!-- Open Graph (social sharing previews) -->
    <meta property="og:title" content="AI Travel Guide" />
    <meta property="og:description" content="AI-powered trip planner with itineraries, weather, visa info, and more." />
    <meta property="og:type" content="website" />

    <!-- PWA manifest & install support -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-512.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TravelGuide" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Google Fonts — preconnect first, then load asynchronously to eliminate render-blocking -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;1,600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
